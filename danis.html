<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沈群鈞 | 數位履歷</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 平滑捲動關鍵設定 */
        html { scroll-behavior: smooth; }

        :root {
            --main-blue: #005a9c;
            --light-blue: #e3f2fd;
            --accent-blue: #4a90e2;
            --white: #ffffff;
            --text-main: #2c3e50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #f5faff 0%, #e3f2fd 100%);
            color: var(--text-main); 
            line-height: 1.8;
        }

        /* 頂部導覽列 */
        .nav-bar {
            position: sticky; top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 15px rgba(0, 90, 156, 0.1);
            z-index: 1000;
        }
        .nav-bar a {
            margin: 0 15px; text-decoration: none; color: var(--main-blue);
            font-weight: 600; transition: 0.3s; font-size: 0.95rem;
        }
        .nav-bar a:hover { color: var(--accent-blue); }

        header {
            padding: 60px 20px; text-align: center; background: var(--white);
            border-bottom: 2px solid var(--light-blue); margin-bottom: 40px;
        }

        .profile-frame {
            width: 140px; height: 140px; margin: 0 auto 20px;
            border: 4px solid var(--white); border-radius: 50%;
            overflow: hidden; box-shadow: 0 0 20px var(--light-blue);
        }
        .profile-frame img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: var(--main-blue); font-size: 2.2rem; letter-spacing: 3px; }
        .title-tag { 
            display: inline-block; background: var(--light-blue); color: var(--main-blue);
            padding: 4px 18px; border-radius: 20px; font-weight: 600; margin-top: 10px;
        }

        .container { max-width: 850px; margin: 0 auto 60px; padding: 0 20px; }

        .card {
            background: var(--white); border-radius: 16px; padding: 35px;
            margin-bottom: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            scroll-margin-top: 100px; /* 防止滑動後標題被導覽列遮住 */
        }

        h2 { 
            color: var(--main-blue); font-size: 1.4rem; margin-bottom: 20px; 
            border-left: 5px solid var(--sub-blue); padding-left: 15px;
            display: flex; align-items: center; gap: 10px;
        }

        /* 專業文句排版 */
        .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .skill-item { background: #f9fcff; padding: 15px; border-radius: 10px; border: 1px solid #eef2f6; }
        .skill-item strong { color: var(--main-blue); display: block; margin-bottom: 5px; }

        .edu-school { font-weight: 700; color: var(--main-blue); font-size: 1.1rem; }
        .edu-info { display: flex; justify-content: space-between; color: var(--sub-blue); font-size: 0.95rem; margin: 5px 0; }

        ul { list-style: none; padding-top: 10px; }
        li { margin-bottom: 8px; position: relative; padding-left: 20px; font-size: 0.95rem; }
        li::before { content: "•"; position: absolute; left: 0; color: var(--accent-blue); font-weight: bold; }

        .cert-btn {
            background: #f0f7ff; color: var(--main-blue); border: 1px solid var(--soft-blue);
